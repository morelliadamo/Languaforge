<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- notepad shadow -->
  <rect x="27" y="22" width="48" height="58" rx="4" fill="#94a3b8" opacity="0.2" transform="translate(3,3)"/>
  <!-- notepad body -->
  <rect x="24" y="20" width="52" height="60" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- top binding -->
  <rect x="24" y="20" width="52" height="10" rx="4" fill="#38bdf8"/>
  <!-- spiral rings -->
  <circle cx="36" cy="20" r="3.5" fill="white" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="50" cy="20" r="3.5" fill="white" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="64" cy="20" r="3.5" fill="white" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- lines -->
  <line x1="32" y1="38" x2="68" y2="38" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="32" y1="46" x2="68" y2="46" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="32" y1="54" x2="68" y2="54" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="32" y1="62" x2="68" y2="62" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- checkmarks -->
  <polyline points="34,36 37,40 44,32" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="34,44 37,48 44,40" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- X mark -->
  <line x1="34" y1="51" x2="40" y2="57" stroke="#f87171" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="51" x2="34" y2="57" stroke="#f87171" stroke-width="2.5" stroke-linecap="round"/>
  <!-- last checkmark -->
  <polyline points="34,60 37,64 44,56" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- owl graduation badge -->
  <circle cx="68" cy="66" r="13" fill="#0ea5e9"/>
  <text x="68" y="70" text-anchor="middle" font-family="Arial" font-size="16" fill="white">🦉</text>
</svg>
