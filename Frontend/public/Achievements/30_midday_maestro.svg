<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </radialGradient>
    <radialGradient id="sun" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- sun rays all around (noon = top) -->
  <line x1="50" y1="14" x2="50" y2="20" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="80" x2="50" y2="86" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="14" y1="50" x2="20" y2="50" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="50" x2="86" y2="50" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="25" y1="25" x2="29" y2="29" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="71" y1="71" x2="75" y2="75" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="75" y1="25" x2="71" y2="29" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="29" y1="71" x2="25" y2="75" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <!-- sun body -->
  <circle cx="50" cy="50" r="22" fill="url(#sun)"/>
  <!-- inner sun highlight -->
  <circle cx="50" cy="50" r="16" fill="#fde68a"/>
  <ellipse cx="44" cy="43" rx="5" ry="3" fill="white" opacity="0.4" transform="rotate(-30 44 43)"/>
  <!-- clock hands (noon = 12 o'clock) -->
  <circle cx="50" cy="50" r="2" fill="#b45309"/>
  <line x1="50" y1="50" x2="50" y2="38" stroke="#b45309" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="50" y2="44" stroke="#b45309" stroke-width="2" stroke-linecap="round"/>
  <!-- 12PM label -->
  <rect x="32" y="72" width="36" height="14" rx="7" fill="#f97316"/>
  <text x="50" y="83" text-anchor="middle" font-family="Arial" font-weight="900" font-size="10" fill="white">12 PM</text>
</svg>
