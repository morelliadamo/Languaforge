<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- shadow -->
  <ellipse cx="50" cy="78" rx="28" ry="5" fill="#93c5fd" opacity="0.4"/>
  <!-- bottom book (green) -->
  <rect x="22" y="62" width="56" height="14" rx="3" fill="#4ade80"/>
  <rect x="22" y="62" width="7" height="14" rx="2" fill="#15803d"/>
  <line x1="30" y1="65" x2="30" y2="73" stroke="#166534" stroke-width="1"/>
  <!-- mid book (pink) -->
  <rect x="25" y="50" width="52" height="14" rx="3" fill="#f9a8d4"/>
  <rect x="25" y="50" width="7" height="14" rx="2" fill="#be185d"/>
  <line x1="33" y1="53" x2="33" y2="61" stroke="#9d174d" stroke-width="1"/>
  <!-- top book (orange) -->
  <rect x="28" y="38" width="48" height="14" rx="3" fill="#fb923c"/>
  <rect x="28" y="38" width="7" height="14" rx="2" fill="#c2410c"/>
  <line x1="36" y1="41" x2="36" y2="49" stroke="#9a3412" stroke-width="1"/>
  <!-- tiny book on top (blue) -->
  <rect x="34" y="28" width="36" height="12" rx="3" fill="#60a5fa"/>
  <rect x="34" y="28" width="6" height="12" rx="2" fill="#1d4ed8"/>
  <line x1="41" y1="31" x2="41" y2="37" stroke="#1e40af" stroke-width="1"/>
  <!-- bookmark ribbon sticking up -->
  <rect x="64" y="22" width="6" height="22" rx="1" fill="#f87171"/>
  <polygon points="64,44 70,44 67,50" fill="#f87171"/>
</svg>
