<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f0ecff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- magnifying glass handle -->
  <rect x="58" y="60" width="18" height="7" rx="3.5" fill="#475569" transform="rotate(45 67 63)"/>
  <!-- magnifying glass ring -->
  <circle cx="44" cy="46" r="22" fill="none" stroke="#7c3aed" stroke-width="6"/>
  <!-- lens -->
  <circle cx="44" cy="46" r="16" fill="#ddd6fe" opacity="0.8"/>
  <!-- shine on lens -->
  <ellipse cx="38" cy="38" rx="5" ry="3" fill="white" opacity="0.6" transform="rotate(-30 38 38)"/>
  <!-- formula text inside lens -->
  <text x="44" y="44" text-anchor="middle" font-family="Arial" font-weight="700" font-size="8" fill="#4c1d95">a+b</text>
  <text x="44" y="54" text-anchor="middle" font-family="Arial" font-weight="700" font-size="8" fill="#4c1d95">=c²</text>
  <!-- sparkles -->
  <path d="M22 24 L23.5 20 L25 24 L29 25.5 L25 27 L23.5 31 L22 27 L18 25.5Z" fill="#a78bfa"/>
  <circle cx="72" cy="28" r="2.5" fill="#c4b5fd"/>
  <circle cx="78" cy="42" r="1.5" fill="#a78bfa"/>
</svg>
