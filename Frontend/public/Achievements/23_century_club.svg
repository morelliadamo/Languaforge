<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fffbea"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </radialGradient>
    <linearGradient id="cup" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- base -->
  <rect x="34" y="76" width="32" height="6" rx="3" fill="#d97706"/>
  <!-- stem -->
  <rect x="44" y="66" width="12" height="12" rx="2" fill="#d97706"/>
  <!-- handles -->
  <path d="M26 40 C18 40 16 52 24 54 L30 54" fill="none" stroke="url(#cup)" stroke-width="5" stroke-linecap="round"/>
  <path d="M74 40 C82 40 84 52 76 54 L70 54" fill="none" stroke="url(#cup)" stroke-width="5" stroke-linecap="round"/>
  <!-- cup body -->
  <path d="M28 22 L30 66 L70 66 L72 22Z" fill="url(#cup)" rx="4"/>
  <!-- cup rim -->
  <rect x="26" y="18" width="48" height="8" rx="4" fill="#fbbf24"/>
  <!-- shine -->
  <ellipse cx="40" cy="36" rx="5" ry="12" fill="white" opacity="0.2" transform="rotate(-10 40 36)"/>
  <!-- 100 inside cup -->
  <text x="50" y="52" text-anchor="middle" font-family="Arial" font-weight="900" font-size="16" fill="#7c2d12">100</text>
  <!-- star -->
  <polygon points="50,22 52,28 58,28 53,32 55,38 50,34 45,38 47,32 42,28 48,28" fill="white" opacity="0.7"/>
</svg>
