<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </radialGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- glow behind bolt -->
  <ellipse cx="50" cy="50" rx="26" ry="34" fill="#fbbf24" opacity="0.25"/>
  <!-- lightning bolt -->
  <polygon points="58,14 36,52 52,52 42,86 72,44 54,44" fill="url(#bolt)" stroke="#d97706" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- highlight on bolt -->
  <polygon points="56,18 46,44 52,44" fill="white" opacity="0.35"/>
  <!-- speed lines -->
  <line x1="16" y1="36" x2="28" y2="36" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="12" y1="46" x2="26" y2="46" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="56" x2="28" y2="56" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <!-- timer badge -->
  <circle cx="26" cy="74" r="12" fill="#ef4444"/>
  <text x="26" y="79" text-anchor="middle" font-family="Arial" font-weight="900" font-size="9" fill="white">2min</text>
</svg>
