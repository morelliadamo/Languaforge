<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f0ecff"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </radialGradient>
    <radialGradient id="medal" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- ribbon left -->
  <rect x="34" y="18" width="14" height="28" rx="2" fill="#818cf8" transform="rotate(-10 41 32)"/>
  <!-- ribbon right -->
  <rect x="52" y="18" width="14" height="28" rx="2" fill="#6366f1" transform="rotate(10 59 32)"/>
  <!-- medal circle -->
  <circle cx="50" cy="62" r="22" fill="url(#medal)" stroke="#b45309" stroke-width="2"/>
  <!-- inner ring -->
  <circle cx="50" cy="62" r="17" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4 2"/>
  <!-- star -->
  <polygon points="50,48 53,58 63,58 55,64 58,74 50,68 42,74 45,64 37,58 47,58" fill="#fff" opacity="0.9"/>
</svg>
