<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </radialGradient>
    <radialGradient id="orb" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- orb stand -->
  <ellipse cx="50" cy="80" rx="18" ry="5" fill="#c4b5fd"/>
  <rect x="44" y="72" width="12" height="10" rx="2" fill="#a78bfa"/>
  <!-- orb shadow -->
  <ellipse cx="50" cy="75" rx="22" ry="6" fill="#7c3aed" opacity="0.2"/>
  <!-- orb main -->
  <circle cx="50" cy="48" r="28" fill="url(#orb)"/>
  <!-- orb shine -->
  <ellipse cx="42" cy="36" rx="8" ry="5" fill="white" opacity="0.35" transform="rotate(-30 42 36)"/>
  <!-- inner magic swirl -->
  <path d="M40 50 Q50 40 60 50 Q50 60 40 50Z" fill="#e9d5ff" opacity="0.5"/>
  <path d="M44 44 Q50 50 56 44" fill="none" stroke="#e9d5ff" stroke-width="1.5" opacity="0.6"/>
  <!-- sparkles around orb -->
  <path d="M22 32 L23.5 28 L25 32 L29 33.5 L25 35 L23.5 39 L22 35 L18 33.5Z" fill="#a78bfa"/>
  <path d="M72 24 L73 21.5 L74 24 L76.5 25 L74 26 L73 28.5 L72 26 L69.5 25Z" fill="#c4b5fd"/>
  <path d="M78 62 L79 60 L80 62 L82 63 L80 64 L79 66 L78 64 L76 63Z" fill="#a78bfa"/>
  <!-- 60 badge -->
  <circle cx="72" cy="72" r="13" fill="#7c3aed" stroke="#4c1d95" stroke-width="1.5"/>
  <text x="72" y="77" text-anchor="middle" font-family="Arial" font-weight="900" font-size="12" fill="white">60</text>
</svg>
