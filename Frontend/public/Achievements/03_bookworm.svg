<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- left book page -->
  <path d="M18 32 Q18 28 22 28 L48 28 L48 72 Q36 68 18 72 Z" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
  <!-- right book page -->
  <path d="M82 32 Q82 28 78 28 L52 28 L52 72 Q64 68 82 72 Z" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
  <!-- spine -->
  <rect x="47" y="28" width="6" height="44" rx="1" fill="#d97706"/>
  <!-- left page lines -->
  <line x1="26" y1="38" x2="44" y2="38" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="44" x2="44" y2="44" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="50" x2="44" y2="50" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="56" x2="44" y2="56" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round"/>
  <!-- worm body on right page -->
  <ellipse cx="67" cy="55" rx="11" ry="8" fill="#86efac"/>
  <ellipse cx="62" cy="62" rx="8" ry="6" fill="#86efac"/>
  <!-- worm head -->
  <circle cx="72" cy="46" r="9" fill="#4ade80"/>
  <!-- worm eyes -->
  <circle cx="69" cy="44" r="2" fill="white"/>
  <circle cx="75" cy="44" r="2" fill="white"/>
  <circle cx="69.8" cy="44.5" r="1" fill="#1e293b"/>
  <circle cx="75.8" cy="44.5" r="1" fill="#1e293b"/>
  <!-- worm smile -->
  <path d="M68 49 Q72 52 76 49" fill="none" stroke="#15803d" stroke-width="1.5" stroke-linecap="round"/>
  <!-- worm antennae -->
  <line x1="70" y1="37" x2="67" y2="31" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  <line x1="74" y1="37" x2="77" y2="31" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  <circle cx="67" cy="30" r="2" fill="#4ade80"/>
  <circle cx="77" cy="30" r="2" fill="#4ade80"/>
</svg>
