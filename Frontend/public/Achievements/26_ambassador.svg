<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f0ecff"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </radialGradient>
    <radialGradient id="globe" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- globe -->
  <circle cx="50" cy="50" r="30" fill="url(#globe)"/>
  <!-- latitude lines -->
  <ellipse cx="50" cy="50" rx="30" ry="10" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  <ellipse cx="50" cy="50" rx="30" ry="20" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- longitude lines -->
  <ellipse cx="50" cy="50" rx="10" ry="30" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  <ellipse cx="50" cy="50" rx="20" ry="30" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- equator -->
  <line x1="20" y1="50" x2="80" y2="50" stroke="white" stroke-width="1" opacity="0.4"/>
  <!-- meridian -->
  <line x1="50" y1="20" x2="50" y2="80" stroke="white" stroke-width="1" opacity="0.4"/>
  <!-- continents (simplified blobs) -->
  <path d="M36 38 C38 34 44 34 46 38 C48 42 44 46 40 44 C36 42 34 42 36 38Z" fill="#4ade80" opacity="0.9"/>
  <path d="M54 36 C58 32 66 34 66 40 C66 46 60 48 56 44 C52 42 50 40 54 36Z" fill="#4ade80" opacity="0.9"/>
  <path d="M42 54 C46 50 54 52 54 58 C54 62 48 64 44 60 C40 58 38 58 42 54Z" fill="#4ade80" opacity="0.9"/>
  <!-- shine -->
  <ellipse cx="40" cy="36" rx="8" ry="5" fill="white" opacity="0.25" transform="rotate(-30 40 36)"/>
  <!-- stand -->
  <ellipse cx="50" cy="82" rx="16" ry="4" fill="#a78bfa"/>
  <rect x="46" y="78" width="8" height="6" rx="2" fill="#8b5cf6"/>
  <!-- 10x badge -->
  <circle cx="72" cy="28" r="13" fill="#7c3aed"/>
  <text x="72" y="33" text-anchor="middle" font-family="Arial" font-weight="900" font-size="11" fill="white">×10</text>
</svg>
