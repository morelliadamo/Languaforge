<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e0eaff"/>
      <stop offset="100%" stop-color="#c7d8ff"/>
    </radialGradient>
  </defs>
  <!-- background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- target rings -->
  <circle cx="50" cy="52" r="32" fill="none" stroke="#f87171" stroke-width="4"/>
  <circle cx="50" cy="52" r="22" fill="none" stroke="#f87171" stroke-width="4"/>
  <circle cx="50" cy="52" r="12" fill="#f87171"/>
  <!-- arrow shaft -->
  <line x1="72" y1="30" x2="54" y2="48" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round"/>
  <!-- arrow head -->
  <polygon points="72,30 62,28 74,40" fill="#1e293b"/>
  <!-- arrow tail feathers -->
  <line x1="72" y1="30" x2="79" y2="23" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="68" y1="26" x2="75" y2="19" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>
</svg>
