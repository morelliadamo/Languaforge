<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- diploma scroll -->
  <rect x="28" y="58" width="44" height="28" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <line x1="36" y1="67" x2="64" y2="67" stroke="#d97706" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="73" x2="58" y2="73" stroke="#d97706" stroke-width="1.5" stroke-linecap="round"/>
  <!-- ribbon -->
  <circle cx="50" cy="79" r="4" fill="#f87171"/>
  <!-- mortarboard base -->
  <ellipse cx="50" cy="44" rx="28" ry="9" fill="#1e293b"/>
  <!-- mortarboard top -->
  <rect x="34" y="30" width="32" height="14" rx="2" fill="#1e293b"/>
  <!-- tassel string -->
  <line x1="78" y1="44" x2="78" y2="60" stroke="#fbbf24" stroke-width="2.5"/>
  <!-- tassel end -->
  <line x1="74" y1="60" x2="82" y2="60" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="75" y1="60" x2="73" y2="66" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="78" y1="60" x2="78" y2="67" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="81" y1="60" x2="83" y2="66" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <!-- top button -->
  <circle cx="50" cy="30" r="3" fill="#fbbf24"/>
</svg>
