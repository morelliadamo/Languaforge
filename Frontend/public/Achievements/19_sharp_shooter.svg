<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff0f0"/>
      <stop offset="100%" stop-color="#ffe4e4"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- target rings -->
  <circle cx="48" cy="52" r="30" fill="white" stroke="#f87171" stroke-width="2"/>
  <circle cx="48" cy="52" r="22" fill="#fecaca" stroke="#f87171" stroke-width="2"/>
  <circle cx="48" cy="52" r="14" fill="#f87171" stroke="#dc2626" stroke-width="1"/>
  <circle cx="48" cy="52" r="6" fill="#dc2626"/>
  <!-- arrow -->
  <line x1="76" y1="24" x2="52" y2="48" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <!-- arrowhead -->
  <polygon points="52,48 44,44 56,40" fill="#1e293b"/>
  <!-- tail feathers -->
  <rect x="74" y="18" width="8" height="4" rx="1" fill="#f87171" transform="rotate(45 78 20)"/>
  <rect x="70" y="22" width="8" height="4" rx="1" fill="#60a5fa" transform="rotate(45 74 24)"/>
  <!-- 100% badge -->
  <rect x="54" y="14" width="30" height="16" rx="8" fill="#16a34a"/>
  <text x="69" y="26" text-anchor="middle" font-family="Arial" font-weight="900" font-size="10" fill="white">100%</text>
</svg>
