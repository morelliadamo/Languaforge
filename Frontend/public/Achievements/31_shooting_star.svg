  <circle cx="64" cy="28" r="3" fill="white" opacity="0.7"/>
  <!-- sparkles from comet -->
  <circle cx="52" cy="46" r="2.5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="40" cy="58" r="2" fill="#fbbf24" opacity="0.6"/>
  <circle cx="28" cy="68" r="1.5" fill="#fbbf24" opacity="0.4"/>
