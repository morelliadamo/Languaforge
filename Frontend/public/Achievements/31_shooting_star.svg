  <circle cx="78" cy="72" r="13" fill="#f97316" stroke="#ea580c" stroke-width="1.5"/>
  <text x="78" y="77" text-anchor="middle" font-family="Arial" font-weight="900" font-size="10" fill="white">7d</text>
