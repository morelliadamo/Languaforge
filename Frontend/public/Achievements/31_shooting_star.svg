<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </radialGradient>
    <linearGradient id="trail" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- background stars -->
  <circle cx="20" cy="22" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="40" cy="16" r="1" fill="white" opacity="0.5"/>
  <circle cx="78" cy="60" r="1" fill="white" opacity="0.4"/>
  <circle cx="84" cy="36" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="18" cy="56" r="0.8" fill="white" opacity="0.4"/>
  <path d="M30 40 L31 37.5 L32 40 L34.5 41 L32 42 L31 44.5 L30 42 L27.5 41Z" fill="white" opacity="0.6"/>
  <path d="M72 22 L73 20 L74 22 L76 23 L74 24 L73 26 L72 24 L70 23Z" fill="white" opacity="0.7"/>
  <!-- comet trail -->
  <path d="M66 34 L16 84" stroke="url(#trail)" stroke-width="8" stroke-linecap="round"/>
