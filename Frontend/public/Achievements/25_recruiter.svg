<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- sound waves -->
  <path d="M68 34 C76 38 80 44 80 50 C80 56 76 62 68 66" fill="none" stroke="#fb923c" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M72 28 C84 34 90 42 90 50 C90 58 84 66 72 72" fill="none" stroke="#fb923c" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <!-- megaphone body -->
  <path d="M20 40 L20 60 L38 60 L64 74 L64 26 L38 40Z" fill="#f97316"/>
  <!-- back plate -->
  <rect x="20" y="40" width="18" height="20" rx="2" fill="#ea580c"/>
  <!-- speaker grill lines -->
  <line x1="24" y1="45" x2="34" y2="45" stroke="#c2410c" stroke-width="1.5"/>
  <line x1="24" y1="50" x2="34" y2="50" stroke="#c2410c" stroke-width="1.5"/>
  <line x1="24" y1="55" x2="34" y2="55" stroke="#c2410c" stroke-width="1.5"/>
  <!-- handle -->
  <rect x="18" y="56" width="8" height="16" rx="4" fill="#c2410c"/>
  <!-- 5 friends badge -->
  <circle cx="72" cy="74" r="13" fill="#16a34a"/>
  <text x="72" y="79" text-anchor="middle" font-family="Arial" font-weight="900" font-size="11" fill="white">×5</text>
</svg>
