<!-- In the Shop – Az üzletben -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    .p  { fill: var(--color, #db2777); }
    .pm { fill: var(--color, #db2777); opacity: 0.60; }
    .pl { fill: var(--color, #db2777); opacity: 0.25; }
  </style>

  <!-- Bag body -->
  <rect class="p" x="8" y="20" width="32" height="24" rx="4"/>

  <!-- Bag handles -->
  <path fill="none" stroke="var(--color, #db2777)" stroke-width="3" stroke-linecap="round"
    d="M16 20 C16 12 20 9 24 9 C28 9 32 12 32 20"/>

  <!-- Bag front panel highlight -->
  <rect class="pl" x="12" y="24" width="24" height="16" rx="2"/>

  <!-- Price tag -->
  <rect class="pm" x="18" y="28" width="12" height="8" rx="2"/>
  <line stroke="white" stroke-width="1.5" stroke-linecap="round" x1="21" y1="32" x2="27" y2="32"/>
  <line stroke="white" stroke-width="1.5" stroke-linecap="round" x1="21" y1="34.5" x2="25" y2="34.5"/>

  <!-- Tag string hole -->
  <circle fill="white" cx="24" cy="27" r="1.2"/>
</svg>
