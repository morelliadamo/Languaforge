<!-- Extended Family – Távolabbi rokonság -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    .p  { fill: var(--color, #0891b2); }
    .pm { fill: var(--color, #0891b2); opacity: 0.60; }
    .pl { fill: var(--color, #0891b2); opacity: 0.25; }
  </style>

  <!-- Three people silhouettes representing extended family -->

  <!-- Left person (smaller – child) -->
  <circle class="pm" cx="10" cy="18" r="4.5"/>
  <path class="pm" d="M5 34 C5 28 15 28 15 34 L15 38 L5 38 Z"/>

  <!-- Center person (larger – adult) -->
  <circle class="p" cx="24" cy="15" r="6"/>
  <path class="p" d="M16 34 C16 26 32 26 32 34 L32 40 L16 40 Z"/>

  <!-- Right person (smaller – child) -->
  <circle class="pm" cx="38" cy="18" r="4.5"/>
  <path class="pm" d="M33 34 C33 28 43 28 43 34 L43 38 L33 38 Z"/>

  <!-- Connection lines between people -->
  <line stroke="var(--color, #0891b2)" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"
    x1="14" y1="20" x2="18" y2="19"/>
  <line stroke="var(--color, #0891b2)" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"
    x1="30" y1="19" x2="34" y2="20"/>
</svg>
