<!-- Sizes and Colours – Méretek és színek -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    .p  { fill: var(--color, #d97706); }
    .pm { fill: var(--color, #d97706); opacity: 0.60; }
    .pl { fill: var(--color, #d97706); opacity: 0.25; }
  </style>

  <!-- Measuring tape band -->
  <rect class="p" x="4" y="20" width="40" height="9" rx="4.5"/>

  <!-- Tick marks on tape -->
  <line stroke="white" stroke-width="1.5" stroke-linecap="round" x1="11" y1="21" x2="11" y2="29"/>
  <line stroke="white" stroke-width="1"   stroke-linecap="round" x1="15" y1="22.5" x2="15" y2="27.5"/>
  <line stroke="white" stroke-width="1.5" stroke-linecap="round" x1="19" y1="21" x2="19" y2="29"/>
  <line stroke="white" stroke-width="1"   stroke-linecap="round" x1="23" y1="22.5" x2="23" y2="27.5"/>
  <line stroke="white" stroke-width="1.5" stroke-linecap="round" x1="27" y1="21" x2="27" y2="29"/>
  <line stroke="white" stroke-width="1"   stroke-linecap="round" x1="31" y1="22.5" x2="31" y2="27.5"/>
  <line stroke="white" stroke-width="1.5" stroke-linecap="round" x1="35" y1="21" x2="35" y2="29"/>
  <line stroke="white" stroke-width="1"   stroke-linecap="round" x1="39" y1="22.5" x2="39" y2="27.5"/>

  <!-- Colour swatches below tape -->
  <circle class="p"  cx="15" cy="38" r="5"/>
  <circle class="pm" cx="24" cy="38" r="5" opacity="0.7"/>
  <circle class="pl" cx="33" cy="38" r="5" opacity="0.4"/>

  <!-- Swatch highlight dots -->
  <circle fill="white" opacity="0.5" cx="13.5" cy="36.5" r="1.5"/>
  <circle fill="white" opacity="0.5" cx="22.5" cy="36.5" r="1.5"/>
  <circle fill="white" opacity="0.5" cx="31.5" cy="36.5" r="1.5"/>
</svg>
