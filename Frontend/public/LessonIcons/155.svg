<!-- Messaging – Üzenetküldés -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    .p  { fill: var(--color, #0ea5e9); }
    .pm { fill: var(--color, #0ea5e9); opacity: 0.60; }
    .pl { fill: var(--color, #0ea5e9); opacity: 0.25; }
  </style>

  <!-- Main chat bubble -->
  <rect class="p" x="4" y="6" width="34" height="24" rx="6"/>
  <!-- Tail -->
  <polygon class="p" points="10,30 4,40 20,30"/>

  <!-- Message lines -->
  <rect fill="white" opacity="0.8" x="10" y="13" width="22" height="2.5" rx="1.2"/>
  <rect fill="white" opacity="0.8" x="10" y="18" width="16" height="2.5" rx="1.2"/>
  <rect fill="white" opacity="0.8" x="10" y="23" width="19" height="2.5" rx="1.2"/>

  <!-- Reply bubble (smaller, top-right) -->
  <rect class="pm" x="26" y="26" width="18" height="14" rx="5"/>
  <polygon class="pm" points="38,40 44,44 30,40"/>

  <!-- Reply dots -->
  <circle fill="white" opacity="0.8" cx="32" cy="33" r="1.5"/>
  <circle fill="white" opacity="0.8" cx="35.5" cy="33" r="1.5"/>
  <circle fill="white" opacity="0.8" cx="39" cy="33" r="1.5"/>
</svg>
