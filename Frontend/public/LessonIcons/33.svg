<!-- Drinks – Italok -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    .p  { fill: var(--color, #7c3aed); }
    .pl { fill: var(--color, #7c3aed); opacity: 0.30; }
    .pm { fill: var(--color, #7c3aed); opacity: 0.65; }
    .str { fill: none; stroke: var(--color, #7c3aed); stroke-linecap: round; }
  </style>

  <!-- Cup body -->
  <path class="p"
    d="M11 18 L14 40 C14 41.1 14.9 42 16 42 L32 42 C33.1 42 34 41.1 34 40 L37 18 Z"
  />

  <!-- Liquid fill effect (lighter top portion) -->
  <path class="pl"
    d="M11 18 L13.2 30 L34.8 30 L37 18 Z"
  />

  <!-- Cup handle -->
  <path class="pm" fill="none" stroke="var(--color, #7c3aed)" stroke-width="3"
    d="M34 24 C42 24 42 34 34 34"
  />

  <!-- Rim highlight -->
  <rect class="pm" x="11" y="16" width="26" height="5" rx="2.5"/>

  <!-- Steam lines -->
  <path class="str" stroke-width="2" stroke-opacity="0.7"
    d="M18 12 C18 9 20 9 20 6"
  />
  <path class="str" stroke-width="2" stroke-opacity="0.7"
    d="M24 13 C24 10 26 10 26 7"
  />
  <path class="str" stroke-width="2" stroke-opacity="0.7"
    d="M30 12 C30 9 32 9 32 6"
  />
</svg>
