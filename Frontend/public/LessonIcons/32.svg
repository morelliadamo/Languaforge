<!-- Food – Ételek -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    .p  { fill: var(--color, #dc2626); }
    .pl { fill: var(--color, #dc2626); opacity: 0.30; }
    .pm { fill: var(--color, #dc2626); opacity: 0.60; }
    .leaf { fill: var(--color, #dc2626); opacity: 0.75; }
  </style>

  <!-- Apple body -->
  <path class="p"
    d="M24 14c-1.1-3.3-5-4-7 0C11.5 14 7 19.5 7 26.5 7 35 13 43 19 43c2 0 3.5-.8 5-1 1.5.2 3 1 5 1 6 0 12-8 12-16.5C41 19.5 36.5 14 31 14c-2-4-5.9-3.3-7 0z"
  />

  <!-- Highlight -->
  <ellipse class="pl" cx="18" cy="22" rx="4" ry="6" transform="rotate(-20 18 22)"/>

  <!-- Stem -->
  <path fill="none" stroke="var(--color, #dc2626)" stroke-width="2.5" stroke-linecap="round"
    d="M24 14 C24 10 27 7 30 6"
  />

  <!-- Leaf -->
  <ellipse class="leaf" cx="29" cy="8" rx="5" ry="2.5" transform="rotate(-30 29 8)"/>
</svg>
