<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .p  { fill: var(--color, #dc2626); }
    .pm { fill: var(--color, #dc2626); opacity: 0.62; }
    .pl { fill: var(--color, #dc2626); opacity: 0.28; }
  </style>
  <!-- Document -->
  <rect class="pl" x="12" y="8"  width="36" height="46" rx="4"/>
  <!-- Folded corner -->
  <path class="pm" d="M38 8 L48 18 L38 18 Z"/>
  <rect class="p"  x="38" y="8" width="10" height="10" rx="0" opacity="0" />
  <!-- Person avatar at top of document -->
  <circle class="p"  cx="26" cy="22" r="5"/>
  <path   class="pm" d="M18 35c0-4.4 3.6-8 8-8s8 3.6 8 8" fill="var(--color,#dc2626)" opacity="0.62"/>
  <!-- Text lines -->
  <rect class="p"  x="18" y="38" width="22" height="2.5" rx="1.2"/>
  <rect class="pm" x="18" y="43" width="16" height="2.5" rx="1.2"/>
  <rect class="pm" x="18" y="48" width="19" height="2.5" rx="1.2"/>
  <!-- CV label -->
  <rect class="p"  x="34" y="20" width="12" height="7" rx="2"/>
  <text x="40" y="26" font-family="sans-serif" font-size="5.5" font-weight="bold" fill="white" text-anchor="middle">CV</text>
</svg>
