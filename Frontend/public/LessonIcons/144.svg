<!-- Describing People – Személyleírás -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    .p  { fill: var(--color, #7c3aed); }
    .pm { fill: var(--color, #7c3aed); opacity: 0.60; }
    .pl { fill: var(--color, #7c3aed); opacity: 0.25; }
  </style>

  <!-- Person silhouette -->
  <circle class="p" cx="24" cy="13" r="7"/>
  <path class="pm" d="M11 38 C11 29 37 29 37 38 L37 44 L11 44 Z"/>

  <!-- Descriptor tag lines radiating out -->
  <!-- Top-right tag -->
  <line stroke="var(--color, #7c3aed)" stroke-width="1.5" stroke-linecap="round"
    x1="29" y1="9" x2="38" y2="5"/>
  <rect class="pl" x="37" y="2" width="9" height="5" rx="1.5"/>
  <line stroke="var(--color, #7c3aed)" stroke-width="1" stroke-linecap="round" x1="38.5" y1="4" x2="44.5" y2="4"/>
  <line stroke="var(--color, #7c3aed)" stroke-width="1" stroke-linecap="round" x1="38.5" y1="6" x2="44.5" y2="6"/>

  <!-- Top-left tag -->
  <line stroke="var(--color, #7c3aed)" stroke-width="1.5" stroke-linecap="round"
    x1="19" y1="9" x2="10" y2="5"/>
  <rect class="pl" x="2" y="2" width="9" height="5" rx="1.5"/>
  <line stroke="var(--color, #7c3aed)" stroke-width="1" stroke-linecap="round" x1="3.5" y1="4" x2="9.5" y2="4"/>
  <line stroke="var(--color, #7c3aed)" stroke-width="1" stroke-linecap="round" x1="3.5" y1="6" x2="8"   y2="6"/>

  <!-- Right tag -->
  <line stroke="var(--color, #7c3aed)" stroke-width="1.5" stroke-linecap="round"
    x1="31" y1="14" x2="40" y2="16"/>
  <rect class="pl" x="39" y="13" width="9" height="5" rx="1.5"/>
  <line stroke="var(--color, #7c3aed)" stroke-width="1" stroke-linecap="round" x1="40.5" y1="15" x2="46.5" y2="15"/>
  <line stroke="var(--color, #7c3aed)" stroke-width="1" stroke-linecap="round" x1="40.5" y1="17" x2="46.5" y2="17"/>
</svg>
