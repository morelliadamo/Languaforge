<!-- Animals – Állatok -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    .p  { fill: var(--color, #16a34a); }
    .pl { fill: var(--color, #16a34a); opacity: 0.35; }
    .pm { fill: var(--color, #16a34a); opacity: 0.65; }
  </style>

  <!-- Paw pad (main) -->
  <ellipse class="p" cx="24" cy="31" rx="10" ry="9"/>

  <!-- Toe beans -->
  <ellipse class="pm" cx="13" cy="22" rx="4" ry="5"/>
  <ellipse class="pm" cx="20" cy="17" rx="4" ry="5"/>
  <ellipse class="pm" cx="28" cy="17" rx="4" ry="5"/>
  <ellipse class="pm" cx="35" cy="22" rx="4" ry="5"/>

  <!-- Inner toe marks on palm -->
  <ellipse class="pl" cx="19" cy="30" rx="2.8" ry="3"/>
  <ellipse class="pl" cx="24" cy="33" rx="2.8" ry="3"/>
  <ellipse class="pl" cx="29" cy="30" rx="2.8" ry="3"/>
</svg>
