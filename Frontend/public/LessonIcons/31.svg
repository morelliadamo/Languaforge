<!-- Introductions – Bemutatkozás -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    .p  { fill: var(--color, #0ea5e9); }
    .pl { fill: var(--color, #0ea5e9); opacity: 0.35; }
    .pm { fill: var(--color, #0ea5e9); opacity: 0.65; }
  </style>

  <!-- Person head -->
  <circle class="p" cx="24" cy="13" r="7"/>

  <!-- Person body -->
  <path class="pm"
    d="M10 38c0-7.73 6.27-14 14-14s14 6.27 14 14H10z"
  />

  <!-- Name badge / ID card -->
  <rect class="pl" x="15" y="30" width="18" height="12" rx="2"/>
  <rect class="p"  x="20" y="27" width="8"  height="4"  rx="1"/>

  <!-- Lines on badge simulating text -->
  <line stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7" x1="18" y1="35" x2="30" y2="35"/>
  <line stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7" x1="18" y1="38.5" x2="27" y2="38.5"/>
</svg>
