<!-- Social Media – Közösségi média -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    .p  { fill: var(--color, #8b5cf6); }
    .pm { fill: var(--color, #8b5cf6); opacity: 0.60; }
    .pl { fill: var(--color, #8b5cf6); opacity: 0.25; }
  </style>

  <!-- Center node -->
  <circle class="p" cx="24" cy="24" r="6"/>

  <!-- Top-left node -->
  <circle class="pm" cx="10" cy="10" r="5"/>
  <!-- Top-right node -->
  <circle class="pm" cx="38" cy="10" r="5"/>
  <!-- Bottom-left node -->
  <circle class="pm" cx="10" cy="38" r="5"/>
  <!-- Bottom-right node -->
  <circle class="pm" cx="38" cy="38" r="5"/>

  <!-- Connection lines -->
  <line stroke="var(--color, #8b5cf6)" stroke-width="2" stroke-opacity="0.45"
    x1="14" y1="13" x2="20" y2="20"/>
  <line stroke="var(--color, #8b5cf6)" stroke-width="2" stroke-opacity="0.45"
    x1="34" y1="13" x2="28" y2="20"/>
  <line stroke="var(--color, #8b5cf6)" stroke-width="2" stroke-opacity="0.45"
    x1="14" y1="35" x2="20" y2="28"/>
  <line stroke="var(--color, #8b5cf6)" stroke-width="2" stroke-opacity="0.45"
    x1="34" y1="35" x2="28" y2="28"/>

  <!-- Cross-connections (top-left to bottom-right style) -->
  <line stroke="var(--color, #8b5cf6)" stroke-width="1.2" stroke-opacity="0.25"
    x1="14" y1="12" x2="34" y2="12"/>
  <line stroke="var(--color, #8b5cf6)" stroke-width="1.2" stroke-opacity="0.25"
    x1="10" y1="15" x2="10" y2="33"/>
  <line stroke="var(--color, #8b5cf6)" stroke-width="1.2" stroke-opacity="0.25"
    x1="38" y1="15" x2="38" y2="33"/>

  <!-- Like thumb up icon on center -->
  <text x="24" y="27" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="8" fill="white" opacity="0.9">♥</text>
</svg>
