<!-- Hardware – Hardver -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    .p  { fill: var(--color, #0369a1); }
    .pm { fill: var(--color, #0369a1); opacity: 0.60; }
    .pl { fill: var(--color, #0369a1); opacity: 0.25; }
  </style>

  <!-- Monitor body -->
  <rect class="p" x="6" y="7" width="36" height="25" rx="3"/>
  <!-- Screen -->
  <rect fill="white" opacity="0.85" x="9" y="10" width="30" height="19" rx="1.5"/>
  <!-- Screen glow lines -->
  <line stroke="var(--color, #0369a1)" stroke-width="1" stroke-opacity="0.2" stroke-linecap="round" x1="12" y1="14" x2="36" y2="14"/>
  <line stroke="var(--color, #0369a1)" stroke-width="1" stroke-opacity="0.2" stroke-linecap="round" x1="12" y1="17" x2="36" y2="17"/>
  <line stroke="var(--color, #0369a1)" stroke-width="1" stroke-opacity="0.2" stroke-linecap="round" x1="12" y1="20" x2="28" y2="20"/>

  <!-- Stand stem -->
  <rect class="pm" x="21" y="32" width="6" height="7" rx="1"/>
  <!-- Stand base -->
  <rect class="pm" x="15" y="39" width="18" height="4" rx="2"/>

  <!-- Keyboard -->
  <rect class="pl" x="8" y="44" width="32" height="3" rx="1.5"/>
  <line stroke="var(--color, #0369a1)" stroke-width="0.8" stroke-opacity="0.4" stroke-linecap="round" x1="12" y1="44" x2="12" y2="47"/>
  <line stroke="var(--color, #0369a1)" stroke-width="0.8" stroke-opacity="0.4" stroke-linecap="round" x1="17" y1="44" x2="17" y2="47"/>
  <line stroke="var(--color, #0369a1)" stroke-width="0.8" stroke-opacity="0.4" stroke-linecap="round" x1="22" y1="44" x2="22" y2="47"/>
  <line stroke="var(--color, #0369a1)" stroke-width="0.8" stroke-opacity="0.4" stroke-linecap="round" x1="27" y1="44" x2="27" y2="47"/>
  <line stroke="var(--color, #0369a1)" stroke-width="0.8" stroke-opacity="0.4" stroke-linecap="round" x1="32" y1="44" x2="32" y2="47"/>
  <line stroke="var(--color, #0369a1)" stroke-width="0.8" stroke-opacity="0.4" stroke-linecap="round" x1="37" y1="44" x2="37" y2="47"/>
</svg>
