<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .p  { fill: var(--color, #0369a1); }
    .pm { fill: var(--color, #0369a1); opacity: 0.62; }
    .pl { fill: var(--color, #0369a1); opacity: 0.28; }
  </style>
  <!-- Monitor screen -->
  <rect class="pl" x="8"  y="10" width="48" height="32" rx="4"/>
  <rect class="pm" x="12" y="14" width="40" height="24" rx="2"/>
  <!-- Screen content lines -->
  <rect class="p"  x="16" y="18" width="22" height="2.5" rx="1.2"/>
  <rect class="p"  x="16" y="23" width="16" height="2.5" rx="1.2"/>
  <rect class="p"  x="16" y="28" width="19" height="2.5" rx="1.2"/>
  <!-- Monitor stand -->
  <rect class="pm" x="28" y="42" width="8"  height="6" rx="1"/>
  <rect class="p"  x="22" y="47" width="20" height="3" rx="1.5"/>
  <!-- Printer box (bottom-right overlay) -->
  <rect class="p"  x="38" y="32" width="18" height="14" rx="3"/>
  <rect class="pm" x="40" y="34" width="14" height="4"  rx="1"/>
  <!-- Paper coming out -->
  <rect class="pl" x="42" y="30" width="10" height="5" rx="1"/>
  <!-- Paper lines -->
  <rect class="p"  x="44" y="31.5" width="6" height="1.2" rx="0.6"/>
  <rect class="p"  x="44" y="33"   width="4" height="1.2" rx="0.6"/>
</svg>
