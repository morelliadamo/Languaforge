<app-header></app-header>

<div
  class="bg-gray-200 min-h-screen flex items-center justify-center py-8 sm:py-12 px-4 sm:px-6"
>
  <div
    class="flex flex-col items-center justify-center w-full max-w-md mx-auto bg-white p-6 sm:p-8 lg:p-10 rounded-3xl shadow-md"
  >
    <img src="Languaforge.png" class="h-20 sm:h-24 object-center" />

    <h1
      class="text-2xl sm:text-3xl lg:text-4xl font-bold text-center mt-10 sm:mt-12 text-sky-500"
    >
      LanguaForge
    </h1>
    <h3
      class="text-sm sm:text-base text-center mb-10 sm:mb-12 text-gray-500 italic font-semibold"
    >
      "Forge Your Language Skills."
    </h3>

    <h2 class="text-xl sm:text-2xl font-bold text-left w-full">Üdv újra</h2>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()"
      class="flex flex-col items-center w-full mt-6 space-y-4"
    >
      <div *ngIf="errorMessage" class="text-red-500 text-sm w-full">
        {{ errorMessage }}
      </div>

      <!-- Social Buttons -->
      <div class="flex gap-4 w-full">
        <!-- Google -->
        <button
          type="button"
          class="flex-1 flex items-center justify-center gap-3 border border-gray-300 rounded-xl py-3 hover:bg-gray-50 transition-colors"
        >
          <img src="google.svg" class="w-5 h-5" viewBox="0 0 24 24" />

          <span class="text-gray-700 font-medium text-sm">Google</span>
        </button>

        <!-- Facebook -->
        <button
          type="button"
          class="flex-1 flex items-center justify-center gap-3 border border-gray-300 rounded-xl py-3 hover:bg-gray-50 transition-colors"
        >
          <svg
            class="w-5 h-5 text-blue-600"
            fill="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              d="M22 12a10 10 0 10-11.6 9.9v-7h-2.2V12h2.2V9.8c0-2.2 1.3-3.4 3.3-3.4.9 0 1.9.2 1.9.2v2.1h-1.1c-1.1 0-1.4.7-1.4 1.3V12h2.4l-.4 2.9h-2v7A10 10 0 0022 12z"
            />
          </svg>
          <span class="text-gray-700 font-medium text-sm">Facebook</span>
        </button>
      </div>

      <!-- Divider -->
      <div class="flex items-center gap-4 w-full">
        <div class="flex-1 h-px bg-gray-300"></div>
        <span class="text-gray-500 text-sm font-medium">VAGY</span>
        <div class="flex-1 h-px bg-gray-300"></div>
      </div>

      <!-- Email / Username -->
      <div class="w-full">
        <input
          type="text"
          formControlName="emailOrUsername"
          placeholder="Email vagy Felhasználónév *"
          class="border border-zinc-300 p-2.5 w-full rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-300 text-sm"
        />
        <div
          *ngIf="
            loginForm.get('emailOrUsername')?.touched &&
            loginForm.get('emailOrUsername')?.invalid
          "
          class="text-red-500 text-xs mt-1"
        >
          Meg kell adnod egy érvényes email címet vagy felhasználónevet
        </div>
      </div>

      <!-- Password -->
      <div class="w-full">
        <input
          type="password"
          formControlName="password"
          placeholder="Jelszó *"
          class="border border-zinc-300 p-2.5 w-full rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-300 text-sm"
        />
        <div
          *ngIf="
            loginForm.get('password')?.touched &&
            loginForm.get('password')?.invalid
          "
          class="text-red-500 text-xs mt-1"
        >
          Meg kell adnod a jelszót (min 6 karakter)
        </div>
      </div>

      <!-- Forgot password -->
      <div class="w-full text-right">
        <a
          routerLink="/forgot-password"
          class="text-sm text-sky-500 hover:underline cursor-pointer"
        >
          Elfelejtetted a jelszavad?
        </a>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="loginForm.invalid || isLoading"
        class="bg-sky-500 text-white py-2.5 w-full rounded-xl hover:bg-sky-600 transition-colors font-semibold disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ isLoading ? "Bejelentkezés..." : "Bejelentkezés" }}
      </button>

      <p class="text-sm text-center text-gray-500 pb-4">
        Nincs fiókod?
        <a
          routerLink="/register"
          class="text-sky-500 hover:underline font-semibold"
          >Regisztráció</a
        >
      </p>
    </form>
  </div>
</div>

<app-footer></app-footer>
