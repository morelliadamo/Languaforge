@if(currentUnlock()){
<div class="fixed top-6 left-1/2 z-50 achievement-outer">
  <div class="achievement-wrapper">
    <div
      class="achievement-card bg-white rounded-2xl shadow-md border border-gray-100 overflow-hidden"
    >
      <!-- Header -->
      <div class="flex items-center gap-3 px-5 pt-5 pb-3">
        <div
          class="w-10 h-10 rounded-xl bg-yellow-50 flex items-center justify-center text-xl flex-shrink-0"
        >
          🏆
        </div>
        <div class="flex-1 min-w-0">
          <p
            class="text-xs font-semibold text-yellow-500 uppercase tracking-wide"
          >
            Feloldott Teljesítmény
          </p>
          <p class="text-base font-bold text-gray-800 truncate">
            {{ currentUnlock()!.name }}
          </p>
        </div>
        <button
          class="w-7 h-7 flex items-center justify-center rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors flex-shrink-0 cursor-pointer"
          (click)="hide()"
          aria-label="Close"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>

      <!-- Body -->
      <div class="flex items-center gap-4 px-5 pb-4">
        @if(currentUnlock()!.iconUrl) {
        <img
          [src]="currentUnlock()!.iconUrl"
          alt="{{ currentUnlock()!.name }}"
          class="w-14 h-14 rounded-xl object-contain bg-gray-50 border border-gray-100 flex-shrink-0"
        />
        }
        <div class="flex-1 min-w-0">
          <p class="text-sm text-gray-600">
            {{ currentUnlock()!.description }}
          </p>
          <p class="text-xs text-gray-400 mt-1">
            {{ currentUnlock()!.earnedAt | date:'HH:mm' }}
          </p>
        </div>
      </div>

      <!-- Progress bar -->
      <div class="h-1 bg-gray-100">
        <div class="progress-drain h-1 bg-yellow-400 rounded-full"></div>
      </div>
    </div>
  </div>
</div>
}
