@if (items.length > 0) {
  <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-6 sm:p-8">
    <h2 class="text-xl font-bold text-gray-800 mb-6">🎒 Tárgyaim</h2>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
      @if (numberOfHearts != 0) {
        <div
          class="border border-gray-100 rounded-2xl p-5 flex flex-col items-center gap-2 hover:shadow-sm transition-shadow"
        >
          <div class="text-4xl">❤️</div>
          <div class="text-2xl font-bold text-sky-500">
            {{ numberOfHearts }}
          </div>
          <div class="text-xs text-gray-500 font-medium">Szív</div>
        </div>
      }

      @if (numberOfHints != 0) {
        <div
          class="border border-gray-100 rounded-2xl p-5 flex flex-col items-center gap-2 hover:shadow-sm transition-shadow"
        >
          <div class="text-4xl">💡</div>
          <div class="text-2xl font-bold text-sky-500">
            {{ numberOfHints }}
          </div>
          <div class="text-xs text-gray-500 font-medium">Tipp</div>
        </div>
      }

      @if (numberOfFreezes != 0) {
        <div
          class="border border-gray-100 rounded-2xl p-5 flex flex-col items-center gap-2 hover:shadow-sm transition-shadow"
        >
          <div class="text-4xl">❄️</div>
          <div class="text-2xl font-bold text-sky-500">
            {{ numberOfFreezes }}
          </div>
          <div class="text-xs text-gray-500 font-medium">Fagyasztás</div>
        </div>
      }

      @if (numberOfCourseSlots != 0) {
        <div
          class="border border-gray-100 rounded-2xl p-5 flex flex-col items-center gap-2 hover:shadow-sm transition-shadow"
        >
          <div class="text-4xl">📦</div>
          <div class="text-2xl font-bold text-sky-500">
            {{ numberOfCourseSlots }}
          </div>
          <div class="text-xs text-gray-500 font-medium">Kurzushely</div>
        </div>
      }
    </div>
  </div>
}
